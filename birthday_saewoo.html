<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐧 새우가 전하는 생일 축하 🐧</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Jua&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#FF85A1;--peach:#FFB5C2;--mint:#B5EAD7;
  --yellow:#FFE566;--bg:#F7F5F0;--deep-pink:#FF4D80;
  --gray-dark:#a8a8a8;--gray-mid:#8e8e8e;--gray-belly:#c0c0c0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Gaegu',cursive;background:var(--bg);overflow-x:hidden;}

#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
#fireworks-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:997;}
.bg-floats{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.bg-float{position:absolute;font-size:1.8rem;opacity:.12;animation:floatUp linear infinite;}
@keyframes floatUp{0%{transform:translateY(110vh) rotate(0);opacity:.12}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}

/* SOUND TOGGLE */
#sound-toggle{position:fixed;top:18px;right:20px;z-index:1000;background:rgba(255,255,255,.15);backdrop-filter:blur(12px);border:2px solid rgba(255,133,161,.5);border-radius:50px;padding:8px 16px;font-family:'Jua',sans-serif;font-size:.95rem;color:white;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:all .3s;text-shadow:0 1px 4px rgba(0,0,0,.4);}
#sound-toggle:hover{transform:scale(1.07);}
#sound-toggle .t-icon{font-size:1.2rem;}
#sound-toggle .t-bar{width:34px;height:18px;background:rgba(255,255,255,.25);border-radius:9px;position:relative;transition:background .3s;}
#sound-toggle.on .t-bar{background:var(--pink);}
#sound-toggle .t-knob{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:white;transition:transform .3s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
#sound-toggle.on .t-knob{transform:translateX(16px);}

/* PENGUIN */
.saewoo{display:inline-block;filter:drop-shadow(0 12px 24px rgba(0,0,0,.18));transition:transform .3s;}
.saewoo:hover{transform:scale(1.08) rotate(-3deg);}
.saewoo-bounce{animation:sbounce 2s ease-in-out infinite;}
@keyframes sbounce{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-20px) rotate(-4deg)}60%{transform:translateY(-10px) rotate(3deg)}}
.saewoo-wiggle{animation:wiggle .6s ease-in-out infinite alternate;}
@keyframes wiggle{from{transform:rotate(-5deg)}to{transform:rotate(5deg)}}

/* SPEECH BUBBLE */
.sb{position:relative;background:white;border-radius:20px;padding:14px 22px;font-size:1.2rem;color:#444;box-shadow:0 6px 20px rgba(0,0,0,.1);border:2.5px solid var(--peach);max-width:340px;text-align:center;animation:sbpop .5s cubic-bezier(.36,.07,.19,.97) both;}
.sb::after{content:'';position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:white;}
.sb.left::after{left:30px;transform:none;}
@keyframes sbpop{0%{transform:scale(.5);opacity:0}80%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}

/* SECTIONS */
section{position:relative;z-index:3;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;}

/* HERO */
#hero{background:linear-gradient(160deg,#2c2c2c 0%,#3d3d3d 35%,#f7f0e8 100%);text-align:center;overflow:hidden;}
.hero-title{font-family:'Jua',sans-serif;font-size:clamp(2.6rem,8vw,5rem);color:white;text-shadow:3px 3px 0 rgba(255,133,161,.6);margin:20px 0 8px;animation:titlePop .8s cubic-bezier(.36,.07,.19,.97) both;}
@keyframes titlePop{0%{transform:scale(.3) rotate(-5deg);opacity:0}80%{transform:scale(1.1) rotate(2deg)}100%{transform:scale(1);opacity:1}}
.hero-sub{font-size:1.7rem;color:var(--peach);margin-bottom:10px;}
.date-badge{display:inline-block;background:linear-gradient(135deg,var(--pink),var(--deep-pink));color:white;padding:10px 28px;border-radius:50px;font-size:1.3rem;font-family:'Jua',sans-serif;box-shadow:0 8px 25px rgba(255,77,128,.35);margin:14px 0 30px;}
.scroll-hint{font-size:1.1rem;color:var(--peach);opacity:.8;animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

/* PHOTOS (수정됨) */
#photos{background:linear-gradient(135deg,#f7f0e8,#fff5f7);}
.photo-static-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 700px;
}
.photo-static-item {
  width: 100%;
  max-width: 500px;
  background: white;
  padding: 15px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  border: 4px solid white;
  transition: transform 0.3s;
}
.photo-static-item:hover {
  transform: scale(1.02) rotate(1deg);
}
.photo-static-item img {
  width: 100%;
  height: auto;
  border-radius: 12px;
  display: block;
}

/* LETTER, GUESTBOOK 등 기타 스타일은 유지됨 */
#letter{background:linear-gradient(135deg,#fffbec,#fff0f5);}
.letter-scene{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap;justify-content:center;width:100%;max-width:720px;}
.letter-card{background:white;border-radius:28px;padding:44px;flex:1;min-width:280px;box-shadow:0 20px 60px rgba(255,133,161,.15);border:3px solid #FFE4EC;position:relative;overflow:hidden;}
.letter-card::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:5px;background:linear-gradient(90deg,var(--pink),#c7ceea,var(--mint),var(--yellow));}
.letter-to{font-size:1.4rem;color:var(--pink);margin-bottom:16px;}
.letter-body{font-size:1.25rem;line-height:2.2;color:#555;white-space:pre-line;}

.lock-overlay{position:absolute;inset:0;z-index:20;background:rgba(255,248,252,.6);backdrop-filter:blur(16px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .8s ease;pointer-events:auto;}
.lock-overlay.unlocked{opacity:0;pointer-events:none;}

.reveal{opacity:0;transform:translateY(40px);transition:opacity .8s ease,transform .8s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<canvas id="fireworks-canvas"></canvas>

<section id="hero">
  <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
    <div class="sb">형아!! 나야 나!! 새우!!<br>오늘 진짜 엄청 중요한 날이야!! 🐧</div>
    </div>
  <h1 class="hero-title">생일 축하해요<br>주동인! 🎉</h1>
  <p class="hero-sub">새우가 엄청 열심히 준비했어!! 💕</p>
  <div class="date-badge">🗓️ 2026년 4월 2일</div>
  <p class="scroll-hint">형아 새우랑 같이 내려가봐 ↓</p>
</section>

<section id="photos" style="position:relative">
  <div class="lock-overlay" id="lockPhotos">
    <span style="font-size:4rem">🔒</span>
    <p style="font-family:'Jua',sans-serif;font-size:1.3rem;color:var(--deep-pink);text-align:center;">사진도 생일날 공개!!<br>새우가 숨겨뒀어!! 🐧📸</p>
  </div>
  
  <h2 class="sec-title reveal" style="color:#3d3d3d; font-family:'Jua',sans-serif; font-size:2.5rem; margin-bottom:30px;">📸 우리의 추억들</h2>
  
  <div class="photo-static-area reveal">
    <div class="photo-static-item">
      <img src="images/photo1.jpg" alt="추억 사진 1">
      <p style="text-align:center; margin-top:10px; color:var(--gray-mid);">멋진 형아의 모습! ✨</p>
    </div>
    
    <div class="photo-static-item">
      <img src="images/photo2.jpg" alt="추억 사진 2">
      <p style="text-align:center; margin-top:10px; color:var(--gray-mid);">함께해서 행복한 시간 🐧</p>
    </div>
  </div>
</section>

<section id="letter">
  <h2 class="sec-title reveal" style="color:#3d3d3d">💌 새우가 전해주는 편지</h2>
  <div class="letter-scene reveal">
    <div class="letter-card">
      <p class="letter-to">주동인에게. 🌸</p>
      <div class="letter-body">생일 진심으로 축하해! 🎉<br>오늘 하루가 형아에게 가장 행복한 날이 되었으면 좋겠어.</div>
    </div>
  </div>
</section>

<script>
// 스크롤 감지 (Reveal 효과)
const observerOptions = { threshold: 0.1 };
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('visible');
  });
}, observerOptions);

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// 카운트다운 및 잠금 해제 로직 (간소화 버전)
const targetDate = new Date('2026-04-02T00:00:00').getTime();

function updateLock() {
  const now = new Date().getTime();
  if (now >= targetDate) {
    document.getElementById('lockPhotos').classList.add('unlocked');
  }
}
setInterval(updateLock, 1000);
updateLock();
</script>

</body>
</html>
